<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="Portfolio photographique de Jean-Christophe Parfait.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jean-Christophe Parfait | Photographie</title>

    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header class="site-header">
  <button class="site-title" id="info-button" type="button">
    <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 6h18M3 12h18M3 18h18"></path>
    </svg>
    <span>Jean-Christophe Parfait</span>
  </button>

  <nav class="view-nav" aria-label="Choix d'affichage">
    <button class="view-button" id="flow-button" type="button">
      <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h16v10H4z"></path>
        <path d="M8 7v10"></path>
      </svg>
      <span>Flow</span>
    </button>

    <button class="view-button is-active" id="grid-button" type="button">
      <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h6v6H4z"></path>
        <path d="M14 4h6v6h-6z"></path>
        <path d="M4 14h6v6H4z"></path>
        <path d="M14 14h6v6h-6z"></path>
      </svg>
      <span>Grid</span>
    </button>
  </nav>
</header>

    <aside class="info-panel" id="info-panel" aria-hidden="true">
      <button class="info-close" id="info-close" type="button" aria-label="Fermer les informations">
        ×
      </button>

      <div class="info-content">
        <p class="info-kicker">Photographie - pensée</p>

        <p>
          Jean-Christophe Parfait développe une photographie attentive aux formes silencieuses du réel :
          les rues, les corps, les traces, les tensions discrètes et les fragments de vie ordinaire.
        </p>

        <p>
          <a href="mailto:contact@jcparfait.fr">contact@jcparfait.fr</a>
        </p>

        <p>
          <a href="mentions-legales.html">
            Mentions légales
          </a>
        </p>
      </div>
    </aside>

    <main class="portfolio-main">
      <section class="gallery-view is-visible" id="grid-view" aria-label="Galerie en grille">
        <div class="grid-gallery" id="grid-gallery"></div>
      </section>

      <section class="flow-view" id="flow-view" aria-label="Galerie en flux horizontal">
        <div class="flow-gallery" id="flow-gallery"></div>
      </section>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
  <img class="lightbox-image" src="" alt="Photographie affichée en plein écran">

  <aside class="lightbox-meta" id="lightbox-meta">
    <p class="lightbox-meta-main" id="lightbox-meta-main"></p>
    <p class="lightbox-meta-secondary" id="lightbox-meta-secondary"></p>
  </aside>
</div>

    <a
  href="https://www.instagram.com/j.c_parfait/"
  class="instagram-fixed"
  target="_blank"
  aria-label="Instagram de Jean-Christophe Parfait"
>
  <svg class="instagram-icon" viewBox="0 0 24 24" aria-hidden="true">
    <rect x="3" y="3" width="18" height="18" rx="5"></rect>
    <circle cx="12" cy="12" r="4"></circle>
    <circle cx="17.5" cy="6.5" r="1"></circle>
  </svg>
</a>

    <script src="script.js"></script>
  </body>
</html>
